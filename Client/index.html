<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/CSS/general.css">
  <link rel="stylesheet" href="./assets/CSS/header.css">
  <link rel="stylesheet" href="./assets/CSS/navigation.css">
  <link rel="stylesheet" href="./assets/CSS/product-container.css">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">     
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <title>Sari-Sari Store</title>
</head>
<body>

  <header id="header-container">
    <div id="header-left">
      <p>Luz and Ramiel Store</p>
    </div>
    <div id="header-middle">
      <input id="search" type="text" placeholder="What are you looking For?">
      <img id="search-icon" src="./assets/icons/search.svg" alt="search-icon" width="30px">
    </div>
    <div id="header-right">
      <div id="myFavorite-container">
        <i class="material-icons">favorite</i>
        <a href="">MY FAVORITE</a>
      </div>
      <div id="cart-container">
        <i class="material-icons">shopping_cart</i>
        <a href="">CART</a>
      </div>
      <div id="login-container">
        <i class="material-icons">person</i>
        <a href="">LOGIN</a>
      </div>
      
    </div>
  </header>

  <nav id="navigation-container">

    <div id="navigation-header">
      <h5>Product categories</h5>
    </div>

    <div id="navigation-body">
      <div id="SelectAll-button">
        Select All
      </div>

      <div id="drinks-button">
        Beverage, Wines, Liquor
        <nav id="Beverage-drop-down-list">
          
        </nav>
      </div>
    
       <div id="Cooking-button">
        Lifestyle Cooking
        <nav id="Beverage-drop-down-list">
    
        </nav>
       </div>
    
       <div id="staple-button">
        Staple
        <nav id="Beverage-drop-down-list">
          
        </nav>
       </div>
    
       <div id="Pantry-button"> 
        Pantry Essentials
        <nav id="Beverage-drop-down-list">
          
        </nav>
       </div>
    
       <div id="homeCare-button">
        Home Care
        <nav id="Beverage-drop-down-list">
          
        </nav>
       </div>
    </div>

  </nav>

  <main id="product-item-container">
    <!-- Product items HERE -->
  </main>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
